name: Check notification

on: [push]

jobs:
  notifications:
    if: github.event.repository.private == true
    name: Rocket.Chat Notifications
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: with mention
        uses: ./
        with:
          type: ${{ job.status }}
          job_name: ':robot_face: *Success*'
          mention: 'here'
          url: ${{ secrets.ROCKET_CHAT_WEBHOOK }}

      - name: with mention on success
        uses: ./
        with:
          type: ${{ job.status }}
          job_name: ':robot_face: *Success*'
          mention: 'here'
          mention_if: 'success'
          url: ${{ secrets.ROCKET_CHAT_WEBHOOK }}

      - name: with mention on always
        uses: ./
        with:
          type: ${{ job.status }}
          job_name: ':robot_face: *Success*'
          mention: 'here'
          mention_if: 'success'
          url: ${{ secrets.ROCKET_CHAT_WEBHOOK }}

      - name: with mention on failure only
        uses: ./
        with:
          type: ${{ job.status }}
          job_name: ':robot_face: *Success no mention*'
          mention: 'here'
          mention_if: 'failure'
          url: ${{ secrets.ROCKET_CHAT_WEBHOOK }}

      - name: with no mention
        uses: ./
        with:
          type: ${{ job.status }}
          job_name: ':robot_face: *Success no mention*'
          url: ${{ secrets.ROCKET_CHAT_WEBHOOK }}

      - name: with commit info
        uses: ./
        with:
          type: ${{ job.status }}
          job_name: ':robot_face: *Commit*'
          commit: 'true'
          url: ${{ secrets.ROCKET_CHAT_WEBHOOK }}
          token: ${{ secrets.GITHUB_TOKEN }}
